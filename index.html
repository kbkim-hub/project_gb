<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>세무 업무 통합 관리자</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap');

        :root {
            --bg: #f8f9fa;
            --text-dark: #212529;
            --text-muted: #6c757d;
            --border: #dee2e6;
            --white: #ffffff;
            --blue: #2563eb;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: var(--bg);
            color: var(--text-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .index-container {
            width: 100%;
            max-width: 600px;
            background: var(--white);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 10px;
            letter-spacing: -0.5px;
        }

        .header p {
            color: var(--text-muted);
            font-size: 14px;
        }

        .menu-list {
            list-style: none;
        }

        .menu-item {
            margin-bottom: 15px;
        }

        .menu-link {
            display: flex;
            align-items: center;
            padding: 18px 24px;
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: 10px;
            text-decoration: none;
            color: var(--text-dark);
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .menu-link:hover {
            border-color: var(--blue);
            background: #f0f7ff;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(37, 99, 235, 0.1);
        }

        .menu-link .icon {
            font-size: 20px;
            margin-right: 15px;
        }

        .menu-link .title {
            flex-grow: 1;
            font-size: 15px;
        }

        .menu-link .arrow {
            color: var(--border);
            font-size: 18px;
            transition: color 0.2s;
        }

        .menu-link:hover .arrow {
            color: var(--blue);
        }

        .footer {
            margin-top: 40px;
            text-align: center;
            font-size: 12px;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

<div class="index-container">
    <div class="header">
        <h1>📑 업무 서식 관리자</h1>
        <p>필요한 신고 서식을 선택하여 작업을 시작하세요.</p>
    </div>

    <ul class="menu-list">
        <li class="menu-item">
            <a href="종합소득세 표지 버전2.html" class="menu-link">
                <span class="icon">📁</span>
                <span class="title">종합소득세 신고관리 (2025/2026)</span>
                <span class="arrow">→</span>
            </a>
        </li>

        <li class="menu-item">
            <a href="종소세 표지.html" class="menu-link">
                <span class="icon">📄</span>
                <span class="title">종합소득세 신고현황 표지</span>
                <span class="arrow">→</span>
            </a>
        </li>
        
        </ul>

    <div class="footer">
        &copy; 2026 Tax Management System. All rights reserved.
    </div>
</div>

</body>
</html>
